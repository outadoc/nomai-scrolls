{% extends "base.html" %}
{% block title %}Nomai Texts{% endblock %}
{% block content %}
<div class="flex flex-col gap-2">
  {% for post in posts %}
  <a href="{{ post.name }}/index.html" class="block bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 rounded-lg p-4 no-underline hover:border-gray-400 dark:hover:border-zinc-600 transition-colors">
    <div class="text-gray-900 dark:text-zinc-100 font-medium leading-snug">{{ post.display_name }}</div>
    <div class="text-gray-500 dark:text-zinc-500 text-xs mt-1">{{ post.block_count }} comment{% if post.block_count != 1 %}s{% endif %}</div>
  </a>
  {% endfor %}
</div>
{% endblock %}
