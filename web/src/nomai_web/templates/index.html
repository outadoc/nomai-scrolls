{% extends "base.html" %}
{% block title %}Nomai Texts{% endblock %}
{% block content %}
<div class="feed">
  {% for post in posts %}
  <div class="post">
    <div class="post-info">
      <a class="post-title" href="{{ post.name }}/index.html">{{ post.display_name }}</a>
      <p class="post-meta">{{ post.block_count }} comment{% if post.block_count != 1 %}s{% endif %}</p>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
