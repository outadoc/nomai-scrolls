{% extends "base.html" %}
{% from "_macros.html" import render_comment %}
{% block title %}{{ display_name }} – Nomai Texts{% endblock %}
{% block content %}
<div class="mb-6">
  <a class="inline-flex items-center gap-1 text-gray-500 dark:text-zinc-500 hover:text-sky-600 dark:hover:text-sky-400 text-xs no-underline mb-3" href="{{ feed_path }}#{{ name }}">← back to feed</a>
  <h1 class="text-2xl font-semibold">{{ display_name }}</h1>
</div>
<div class="flex flex-col">
  {% for comment in tree %}{{ render_comment(comment) }}{% endfor %}
</div>
{% endblock %}
