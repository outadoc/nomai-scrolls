<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Nomai Texts{% endblock %}</title>
  <link rel="stylesheet" href="{{ css_path }}">
</head>
<body>
  <header>
    <a href="{{ home_path }}" class="site-title">r/NomaiTexts</a>
    <nav class="lang-selector">
      {% for code, url in lang_links %}
      <a href="{{ url }}" class="lang-link{% if code == lang %} active{% endif %}">{{ code }}</a>
      {% endfor %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
